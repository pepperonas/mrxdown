name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write
  discussions: write

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
      fail-fast: false

    steps:
    - name: Check out Git repository
      uses: actions/checkout@v4

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm ci
        npm run postinstall
      env:
        ELECTRON_CACHE: ~/.cache/electron
        ELECTRON_BUILDER_CACHE: ~/.cache/electron-builder

    - name: Install Linux dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-setuptools build-essential libnss3-dev libatk-bridge2.0-dev libdrm2 libxkbcommon-dev libxss1 libasound2-dev libgtk-3-dev libgbm-dev libxrandr2 libxtst6 libxcomposite1 libatspi2.0-0 xvfb

    - name: Build app for macOS
      if: matrix.os == 'macos-latest'
      run: |
        npx electron-builder --mac zip --publish=never
        ls -la dist/
      env:
        CSC_IDENTITY_AUTO_DISCOVERY: false

    - name: Build app for Windows
      if: matrix.os == 'windows-latest'
      run: |
        npm run build-win
        dir dist
      env:
        CSC_IDENTITY_AUTO_DISCOVERY: false

    - name: Build app for Linux
      if: matrix.os == 'ubuntu-latest'
      run: |
        xvfb-run -a npm run build-linux
        ls -la dist/
      env:
        CSC_IDENTITY_AUTO_DISCOVERY: false
        DISPLAY: :99

    - name: Generate checksums (macOS/Linux)
      if: matrix.os != 'windows-latest'
      run: |
        cd dist
        find . -maxdepth 1 \( -name "*.zip" -o -name "*.AppImage" -o -name "*.deb" \) -exec shasum -a 256 {} + > checksums.txt 2>/dev/null || true
        cat checksums.txt || echo "No artifacts found"

    - name: Generate checksums (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        cd dist
        Get-ChildItem -Filter "*.exe" | ForEach-Object {
          $hash = (Get-FileHash $_.Name -Algorithm SHA256).Hash.ToLower()
          "$hash  $($_.Name)" | Out-File -Append checksums.txt -Encoding utf8
        }
        Get-Content checksums.txt

    - name: Upload artifacts (macOS)
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: macos-artifacts
        path: |
          dist/mrxdown-macos-*.zip
          dist/checksums.txt
        if-no-files-found: warn
        retention-days: 30

    - name: Upload artifacts (Windows)
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: windows-artifacts
        path: |
          dist/mrxdown-windows-*.exe
          dist/checksums.txt
        if-no-files-found: warn
        retention-days: 30

    - name: Upload artifacts (Linux)
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: linux-artifacts
        path: |
          dist/mrxdown-linux-*.AppImage
          dist/mrxdown-linux-*.deb
          dist/checksums.txt
        if-no-files-found: warn
        retention-days: 30

  create-release:
    needs: release
    runs-on: ubuntu-latest

    steps:
    - name: Check out Git repository
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        merge-multiple: true

    - name: Collect checksums
      run: |
        echo "## Checksums (SHA256)" > release-checksums.md
        echo '```' >> release-checksums.md
        cat checksums.txt >> release-checksums.md
        echo '```' >> release-checksums.md
        echo ""
        echo "All checksums:"
        cat checksums.txt
        echo ""
        echo "All release files:"
        ls -la mrxdown-*

    - name: Create Release
      id: create_release
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ github.ref_name }}
        name: MrxDown ${{ github.ref_name }}
        draft: false
        prerelease: false
        bodyFile: release-checksums.md
        artifacts: |
          mrxdown-*
        token: ${{ secrets.GITHUB_TOKEN }}
        allowUpdates: true
        replacesArtifacts: true
        makeLatest: true
