<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Hintergrund: MrxDown-M3E-Tonflaeche, diagonal von container-high nach dim -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3d4250"/>
      <stop offset="0.55" stop-color="#2b2e3b"/>
      <stop offset="1" stop-color="#191b22"/>
    </linearGradient>
    <!-- Primary-Glow oben links -->
    <radialGradient id="glow" cx="0.30" cy="0.22" r="0.85">
      <stop offset="0" stop-color="#a2c9ec" stop-opacity="0.22"/>
      <stop offset="0.45" stop-color="#a2c9ec" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#a2c9ec" stop-opacity="0"/>
    </radialGradient>
    <!-- Glyph: Primary-Verlauf hell nach kraeftig -->
    <linearGradient id="glyph" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e3f0fc"/>
      <stop offset="0.5" stop-color="#a2c9ec"/>
      <stop offset="1" stop-color="#79a8d4"/>
    </linearGradient>
    <!-- Weicher Schatten unter der Glyphe -->
    <filter id="glyphShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.40"/>
    </filter>
    <!-- macOS-Style Aussenschatten der Kachel -->
    <filter id="tileShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="28" flood-color="#000000" flood-opacity="0.50"/>
    </filter>
    <clipPath id="tileClip">
      <rect x="100" y="100" width="824" height="824" rx="185"/>
    </clipPath>
    <linearGradient id="glyphArrow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dff0d3"/>
      <stop offset="0.5" stop-color="#b1cba0"/>
      <stop offset="1" stop-color="#8cab79"/>
    </linearGradient>
  </defs>

  <!-- Kachel -->
  <g filter="url(#tileShadow)">
    <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#bg)"/>
  </g>
  <g clip-path="url(#tileClip)">
    <rect x="100" y="100" width="824" height="824" fill="url(#glow)"/>
    <!-- feine Top-Kante als Lichtfang -->
    <rect x="100" y="100" width="824" height="3" fill="#ffffff" opacity="0.14"/>
  </g>

  <!-- Glyphe: M + Pfeil nach unten (Markdown-Mark), Pillen-Striche im M3E-Stil -->
  <g filter="url(#glyphShadow)" stroke="url(#glyph)" stroke-width="80"
     stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- M (schmaler, klarer Abstand zum Pfeil) -->
    <path d="M 256 660 L 256 368 L 396 556 L 536 368 L 536 660"/>
    <!-- Pfeil: Schaft + Spitze als EIN Pfad (Subpfade) -->
    <path stroke="url(#glyphArrow)" d="M 700 368 L 700 600 M 630 534 L 700 610 L 770 534"/>
  </g>
</svg>
